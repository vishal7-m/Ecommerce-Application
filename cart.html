<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — ANTI BIKILI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-wrap">
    <a href="index.html" class="logo">ANTI<span>BIKILI</span></a>
    <form class="nav-search" id="navSearchForm">
      <input type="text" id="navSearchInput" placeholder="Search for products...">
      <button type="submit">🔍</button>
    </form>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="wishlist.html">Wishlist <span class="badge" id="wishBadge" style="display:none;">0</span></a>
      <a href="cart.html">Cart <span class="badge" id="cartBadge" style="display:none;">0</span></a>
      <a href="checkout.html">Checkout</a>
    </nav>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <button class="hamburger" id="hamburgerBtn">☰</button>
  </div>
</header>

<div class="container">
  <h1 class="page-title">Your Cart</h1>
  <p class="page-sub">Review your items before checkout.</p>

  <div class="cart-layout" id="cartLayout">
    <div id="cartItemsList"></div>
    <div class="summary-box">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">₹0</span></div>
      <div class="summary-row"><span>Shipping</span><span id="sumShipping">₹0</span></div>
      <div class="summary-row"><span>Tax (5%)</span><span id="sumTax">₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="sumTotal">₹0</span></div>
      <a href="checkout.html" class="btn btn-primary btn-full" id="checkoutBtn" style="margin-top:14px;display:block;text-align:center;">Proceed to Checkout</a>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container">Built by Vishal M &middot; ANTI BIKILI Demo Project &middot; No real payments processed</div>
</footer>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
