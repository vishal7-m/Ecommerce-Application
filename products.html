<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — ANTI BIKILI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="nav-wrap">
    <a href="index.html" class="logo">ANTI<span>BIKILI</span></a>
    <form class="nav-search" id="navSearchForm">
      <input type="text" id="navSearchInput" placeholder="Search for products...">
      <button type="submit">🔍</button>
    </form>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="wishlist.html">Wishlist <span class="badge" id="wishBadge" style="display:none;">0</span></a>
      <a href="cart.html">Cart <span class="badge" id="cartBadge" style="display:none;">0</span></a>
      <a href="checkout.html">Checkout</a>
    </nav>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <button class="hamburger" id="hamburgerBtn">☰</button>
  </div>
</header>

<div class="container">
  <h1 class="page-title">All Products</h1>
  <p class="page-sub">Search, filter and find exactly what you need.</p>

  <div class="filters-bar">
    <div>
      <label>Category</label>
      <select id="filterCategory">
        <option value="">All</option>
      </select>
    </div>
    <div>
      <label>Sort by</label>
      <select id="filterSort">
        <option value="">Relevance</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="name">Name (A-Z)</option>
      </select>
    </div>
    <div>
      <label>Min ₹</label>
      <input type="text" id="filterMin" style="width:80px" placeholder="0">
    </div>
    <div>
      <label>Max ₹</label>
      <input type="text" id="filterMax" style="width:80px" placeholder="5000">
    </div>
    <button class="btn btn-outline btn-sm" id="clearFilters">Clear Filters</button>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div class="product-grid" id="productGrid"></div>
</div>

<footer class="site-footer">
  <div class="container">Built by Vishal M &middot; ANTI BIKILI Demo Project &middot; No real payments processed</div>
</footer>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script src="js/home.js"></script>
<script src="js/products.js"></script>
</body>
</html>
